name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same ref so re-pushes don't pile up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Schema-only DATABASE_URL — the build runs prisma generate which needs a
  # well-formed url present, but it does not need to connect.
  DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
  AUTH_SECRET: ci-only-32byte-base64-value-not-real-AAAAAAAAAA
  AUTH_URL: http://localhost:3000
  NEXT_PUBLIC_APP_URL: http://localhost:3000

jobs:
  verify:
    name: Typecheck + lint + format + tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Tests
        run: pnpm test

  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
