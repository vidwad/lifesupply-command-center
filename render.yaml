# LifeSupply Command Center — Render blueprint.
#
# Renders this file via "Blueprint" in the Render dashboard:
# https://render.com/docs/blueprint-spec
#
# Defines:
#   1. A Postgres database (with daily backups + PITR on the standard plan)
#   2. A web service running the Dockerfile (web + Playwright in one image)
#   3. A daily cron that prunes the audit log
#
# Secrets that can't be auto-generated (ANTHROPIC_API_KEY, RESEND_API_KEY,
# integration vault keys, etc.) are added manually in the dashboard after
# the blueprint applies. Run `MASTER_ENCRYPTION_KEY` and `AUTH_SECRET`
# generation locally with `openssl rand -base64 32` and paste them in.

databases:
  - name: lifesupply-cc-db
    databaseName: lifesupply_cc
    user: lifesupply_cc
    # Postgres plans: basic_256mb ($6/mo, 256 MB RAM, 1 GB storage),
    # basic_1gb ($19/mo, 1 GB RAM, 5 GB storage), pro_4gb ($95/mo) etc.
    # Bump to basic_1gb once you have real traffic and want headroom.
    plan: basic_256mb
    postgresMajorVersion: 16

services:
  # -------------------------------------------------------------------------
  # Web service — runs the Next.js app + Playwright in one container.
  # -------------------------------------------------------------------------
  - type: web
    name: lifesupply-cc-web
    runtime: docker
    plan: starter # $7/mo Starter; bump to standard ($25) for 2GB RAM
    branch: main
    healthCheckPath: /api/health
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    envVars:
      # ---- generated by Render at first apply ----
      - key: AUTH_SECRET
        generateValue: true
      - key: MASTER_ENCRYPTION_KEY
        generateValue: true

      # ---- pulled from the database service above ----
      - key: DATABASE_URL
        fromDatabase:
          name: lifesupply-cc-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: lifesupply-cc-db
          property: connectionString

      # ---- always set ----
      - key: NODE_ENV
        value: production
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: AUDIT_RETENTION_DAYS
        value: "365"
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"

      # ---- domain-dependent: set after first deploy ----
      # AUTH_URL and NEXT_PUBLIC_APP_URL must match the public domain.
      # Add them in the Render dashboard once the service has a URL.
      - key: AUTH_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false

      # ---- AI provider — required for AI features ----
      - key: ANTHROPIC_API_KEY
        sync: false

      # ---- optional: investor-update email distribution ----
      - key: RESEND_API_KEY
        sync: false
      - key: INVESTOR_FROM_EMAIL
        sync: false
      - key: INVESTOR_FROM_NAME
        value: LifeSupply

      # ---- optional: BBM01 supplier portal — leave unset to use mock ----
      - key: SUPPLIER_PORTAL_BBM01_URL
        sync: false

  # -------------------------------------------------------------------------
  # Cron — daily audit log retention sweep.
  # Runs at 03:15 UTC. The same logic backs the manual button at
  # /admin/audit-logs, so this just means the maintenance happens
  # automatically overnight.
  # -------------------------------------------------------------------------
  - type: cron
    name: lifesupply-cc-audit-retention
    runtime: docker
    plan: starter
    branch: main
    schedule: "15 3 * * *"
    dockerfilePath: ./Dockerfile
    dockerCommand: pnpm tsx scripts/cron/audit-retention.ts
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lifesupply-cc-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: lifesupply-cc-db
          property: connectionString
      - key: AUDIT_RETENTION_DAYS
        sync: false
      - key: MASTER_ENCRYPTION_KEY
        sync: false
